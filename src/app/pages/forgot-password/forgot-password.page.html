<div class="page">
  <div class="card">
    <h1>Восстановление пароля</h1>
    <p class="subtitle">Получите код на email и задайте новый пароль</p>

    @if (error) {
      <div class="error" role="alert">{{ error }}</div>
    }
    @if (success) {
      <div class="success" role="status">{{ success }}</div>
    }

    @if (step === 'request') {
      <form [formGroup]="requestForm" (ngSubmit)="requestCode()" class="form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" formControlName="email" autocomplete="email" placeholder="Введите email" />
          @if (requestForm.get('email')?.invalid && requestForm.get('email')?.touched) {
            <span class="field-error">Введите корректный email</span>
          }
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Отправка…' : 'Отправить код' }}
        </button>
      </form>
    } @else {
      <form [formGroup]="resetForm" (ngSubmit)="resetPassword()" class="form">
        <div class="field">
          <label for="email2">Email</label>
          <input id="email2" type="email" formControlName="email" autocomplete="email" />
        </div>

        <div class="field">
          <label for="code">Код (4–6 цифр)</label>
          <input id="code" type="text" inputmode="numeric" formControlName="code" autocomplete="one-time-code" placeholder="123456" />
        </div>

        <div class="row">
          <div class="field">
            <label for="password">Новый пароль</label>
            <input id="password" type="password" formControlName="password" autocomplete="new-password" />
          </div>
          <div class="field">
            <label for="password_confirm">Повторите пароль</label>
            <input id="password_confirm" type="password" formControlName="password_confirm" autocomplete="new-password" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Сохранение…' : 'Обновить пароль' }}
        </button>

        <button type="button" class="btn btn-secondary" (click)="resend()" [disabled]="resendLoading">
          {{ resendLoading ? 'Отправка…' : 'Отправить код ещё раз' }}
        </button>
      </form>
    }

    <p class="footer">
      <a routerLink="/login">← Назад ко входу</a>
    </p>
  </div>
</div>
