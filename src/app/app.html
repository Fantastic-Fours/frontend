<app-soft-glow-background>
<div class="app">
  <nav class="nav">
    <a routerLink="/match" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" class="logo-link">
      <img src="assets/logo.jpg" alt="iDom" class="logo-img" />
    </a>
    <div class="nav-center">
      <app-mega-menu [items]="primaryNavItems" />
    </div>

    <div class="nav-links nav-links--auth">
      @if (!isAuthenticated()) {
        <a
          routerLink="/register"
          routerLinkActive="active"
          class="nav-link nav-link--wave"
        >
          <app-wave-text text="Регистрация" />
        </a>
        <a
          routerLink="/login"
          routerLinkActive="active"
          class="nav-link nav-link--wave"
        >
          <app-wave-text text="Вход" />
        </a>
      } @else {
        <a routerLink="/profile" routerLinkActive="active" class="nav-link nav-link--wave">
          <app-wave-text text="Профиль" />
        </a>
        <button type="button" class="nav-link nav-logout" (click)="logout()">
          <app-wave-text text="Выйти" />
        </button>
      }
    </div>
  </nav>
  <main class="main">
    <router-outlet />
  </main>
  <app-site-footer />
</div>
</app-soft-glow-background>
